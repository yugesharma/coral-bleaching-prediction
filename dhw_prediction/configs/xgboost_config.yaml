model:
  name: xgboost

data:
  train_path: data/processed/train.pkl
  val_path: data/processed/val.pkl
  test_path: data/processed/test.pkl
  features:
    - mmm_sst
    - surface_sst_anom
    - hotspot
    - mld
    - ohc_30m
    - hp_depth
    - dhw_at_T
    - dhw_lag_7d
    - dhw_lag_14d
    - dhw_lag_28d
    - dhw_delta_1w
    - dhw_delta_4w
  target: label

hpo:
  n_trials: 50
  metric: pr_auc
  direction: maximize

hyperparameters:
  n_estimators: 300
  max_depth: 4
  learning_rate: 0.05
  subsample: 0.8
  colsample_bytree: 0.8
  early_stopping_rounds: 30

output:
  dir: experiments/runs/xgboost